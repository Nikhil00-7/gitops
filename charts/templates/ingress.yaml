apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ .Values.ingress.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "{{ .Values.ingress.useRegex }}"
spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.frontendIngress.path }}
            pathType: {{ .Values.ingress.frontendIngress.pathType }}
            backend:
              service:
                name: {{ .Values.ingress.frontendIngress.serviceName }}
                port:
                  number: {{ .Values.ingress.frontendIngress.servicePort }}

          - path: {{ .Values.ingress.backendIngress.path }}
            pathType: {{ .Values.ingress.backendIngress.pathType }}
            backend:
              service:
                name: {{ .Values.ingress.backendIngress.serviceName }}
                port:
                  number: {{ .Values.ingress.backendIngress.servicePort }}
~                                                                         