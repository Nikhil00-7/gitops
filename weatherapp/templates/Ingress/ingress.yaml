apiVersion: networking.k8s.io/v1 
kind: Ingress
metadata: 
  name: {{ .Values.ingress.name }}
  namespace: {{ .Values.global.namespace }}
spec: 
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths: 
          - path: {{ .Values.frontendIngress.path }}
            pathType: {{ .Values.frontendIngress.pathType }}
            backend: 
              service: 
                name: {{ .Values.frontendIngress.serviceName }}
                port: 
                  number: {{ .Values.frontendIngress.servicePort }}
          - path: {{ .Values.backendIngress.path }}
            pathType: {{ .Values.backendIngress.pathType }}
            backend: 
              service: 
                name: {{ .Values.backendIngress.serviceName }}
                port: 
                  number: {{ .Values.backendIngress.servicePort }}